<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="keywords" content="Prompt Library">
		<meta property="og:site_name" content="Prompt Library">
		<meta name="author" content="Code Ninjas Winnipeg">
    <!-- Firebase Compat v10 -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

		<title>Prompt Library</title>
		<link href="/style.css" rel="stylesheet" type="text/css" media="all">
	</head>
	<body>
		<span id="page" hidden>sign-up</span>
		<div class="flex-wrapper">
			<div id="header"></div>

			<div id="content">
				<div class="center">
					<h1>Sign Up</h1>
					<p>Fill out your information and create an account.</p>
					<form>
						<label for="user-email">Email Address</label><br>
						<input type="email" id="user-email" name="user-email" placeholder="Email Address" value=""><br>
						<label for="user-name">Username</label><br>
						<input type="text" id="user-name" name="user-name" placeholder="Username" value=""><br><br>
						<label for="user-password">Password</label><br>
						<input type="password" id="user-password" name="user-password" placeholder="Password" value=""><br>
						<label for="user-password">Confirm Password</label><br>
						<input type="password" id="user-password-confirm" name="user-password" placeholder="Retype Password" value=""><br><br>
            <input type="checkbox" id="user-consent">
            <label class="label-normal" for="user-consent">I agree that I am above the age of 13 before creating this account.</label>
					</form>
					<small id="sign-in-error" class="sign-in-error"></small>
					<br>
          <br>
					<button id="user-submit">Sign up!</button>
					<small>
						<h3>Already have an account? <a href="/sign-in.html">Sign in</a>!</h3>
					</small>

				</div>
			</div>

			<div id="footer"></div>

		</div>

		<script src="/include/background/prompt.js"></script>
		<script src="/include/background/auth.js"></script>
		<script src="/include/header.js"></script>
		<script src="/include/footer.js"></script>
	</body>
</html>
